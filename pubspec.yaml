name: secure_banking_app
description: "A secure banking mobile application optimized for MiniLab."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.0

  # Architecture & Routing
  provider: ^6.1.2
  go_router: ^17.3.0

  # Security & Biometrics
  flutter_secure_storage: ^10.3.1
  local_auth: ^3.0.1
  screen_protector: ^1.5.2
  root_checker_plus: ^1.0.0

  # Device & Package Information
  device_info_plus: ^13.1.0
  package_info_plus: ^10.1.0
  #package_signature: 1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/logo.jpg # 👈 اصلاح شد به jpg

# ✨ تنظیمات تولید خودکار آیکون برنامه (App Icon)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.jpg" # 👈 اصلاح شد به jpg

# ✨ تنظیمات تولید خودکار صفحه اسپلش نیتیو (Native Splash Screen)
flutter_native_splash:
  color: "#051F20"
  image: assets/images/logo.jpg # 👈 اصلاح شد به jpg
  android: true
  ios: true